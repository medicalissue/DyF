# dstack profiles for the DyF spot campaign.
#
# `h100-spot-usw2` pins every run to AWS us-west-2 spot capacity. The
# retry block keeps the run alive across (a) initial no-capacity,
# (b) spot preemption during run, and (c) transient non-zero exits,
# for up to 72 h of wall time. The orchestrator treats SIGTERM as a
# clean pause point — checkpoint is already on S3 — so retry just
# re-enters the queue and another worker (or the same one, on a
# different VM) resumes from the latest checkpoint.

profiles:
  - name: h100-spot-usw2
    default: true
    backends: [aws]
    regions: [us-west-2]
    availability_zones: [us-west-2d, us-west-2c, us-west-2b, us-west-2a]
    spot_policy: spot
    max_duration: 72h
    retry:
      on_events: [no-capacity, interruption, error]
      duration: 72h
