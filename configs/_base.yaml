# Shared defaults for the DyF training campaign.
#
# Single source of truth for "everything except (model, normalization)"
# so that comparisons stay controlled. Per-arch YAMLs include this file
# and override only what the arch demands (model name, batch size, etc).

# ── Data ──────────────────────────────────────────────────────────
# ImageNet-1k under /data/imagenet/{train,val}/<class>/<img>.JPEG
# Workers mount /data via dstack volume or EBS snapshot at boot;
# orchestrate.sh sanity-checks the layout before launching main.py.
data_path: /data/imagenet
data_set: IMNET
nb_classes: 1000
input_size: 224
num_workers: 10
pin_mem: true

# ── Optimizer (DyT/ConvNeXt baseline) ─────────────────────────────
opt: adamw
opt_eps: 1.0e-8
weight_decay: 0.05
lr: 4.0e-3                  # for total batch 4096; scale linearly
warmup_epochs: 20
min_lr: 1.0e-6

# ── Schedule ──────────────────────────────────────────────────────
epochs: 300
update_freq: 1

# ── Augmentation (timm DeiT recipe) ───────────────────────────────
color_jitter: 0.4
aa: rand-m9-mstd0.5-inc1
smoothing: 0.1
train_interpolation: bicubic
reprob: 0.25
remode: pixel
mixup: 0.8
cutmix: 1.0
mixup_prob: 1.0
mixup_switch_prob: 0.5

# ── Runtime ───────────────────────────────────────────────────────
# bf16 AMP keeps fp32 dynamic range → no GradScaler dance, no underflow.
# Tensor cores on H100/A100 give the same throughput as fp16 with this
# dtype. torch.compile (inductor) adds 20-40% steady-state speedup; the
# 'default' mode warms up in ~30s. 'max-autotune' is slower to compile
# but ~5-10% faster steady-state — switch if a long run justifies it.
use_amp: true
amp_dtype: bfloat16
compile: true
compile_mode: default
seed: 42
auto_resume: true
save_ckpt: true
save_ckpt_freq: 1
save_ckpt_num: 3
disable_eval: false
dist_eval: true

# ── DyF defaults (overridden per activation in launcher) ──────────
dynamic_tanh: false
dynamic_floor: false
dyf_kernel: silu
dyf_hard: false
dyf_a_init: 0.0
dyf_gamma_init: 1.0
dyf_beta_init: 0.0
