# Smoke-test config: 2 epochs on a fake/tiny dataset.
# Used by `bash scripts/dryrun.sh` to validate the swap + train loop
# before launching a real campaign on a real cluster.
include: ../_base.yaml

model: convnext_tiny
batch_size: 16
update_freq: 1
epochs: 2
warmup_epochs: 0
data_set: image_folder      # caller points data_path at /tmp/fake_imgs
num_workers: 2
mixup: 0.0
cutmix: 0.0
disable_eval: true
save_ckpt: false
auto_resume: false
use_amp: false
nb_classes: 10
input_size: 64
