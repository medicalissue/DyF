# ViT-Base/16 — primary target for prediction (C5).
include: ../_base.yaml

model: vit_base_patch16_224
# H100 80GB + bf16 fits per-GPU batch=512 (verified attempt 8 used
# only ~20 GB at batch=256 → 4× headroom). 512 × 8 × 1 = 4096
# effective, same as DyT recipe. update_freq=1 means one DDP
# all-reduce per optimizer step (vs 2 with batch=256), and the step
# count per epoch halves to 312. Combined with workers=24 below this
# eliminates the dataloader bottleneck observed at batch=256 (data
# wait was ~50% of step time).
batch_size: 512
update_freq: 1
# 24 dataloader workers per GPU × 8 GPU = 192 workers, matches the
# p5.48xlarge's 192 vCPU count. attempt 8 measured load avg ~80 with
# 80 workers — CPU was 50% idle. More workers keeps the GPUs fed.
num_workers: 24
drop_path: 0.1
clip_grad: 1.0
model_ema: true
model_ema_decay: 0.9999
model_ema_eval: false
