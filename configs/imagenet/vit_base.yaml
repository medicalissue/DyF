# ViT-Base/16 — primary target for prediction (C5).
include: ../_base.yaml

model: vit_base_patch16_224
# H100 80GB + bf16 holds per-GPU batch 256 with ~10GB margin (verified
# experience). 256 × 8 × 2 = 4096 effective, same as DyT recipe. Half
# the all-reduce + kernel-launch overhead vs (128, update_freq=4) →
# ~15-25% faster in practice. Drop to 128/4 if a future model variant
# OOMs with no headroom.
batch_size: 256
update_freq: 2
drop_path: 0.1
clip_grad: 1.0
model_ema: true
model_ema_decay: 0.9999
model_ema_eval: false
